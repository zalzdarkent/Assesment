<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Test - Form Input</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Formulir Data Karyawan</h4>
                    </div>
                    <div class="card-body">
                        <form id="formKaryawan">
                            <div class="mb-3">
                                <label for="nama" class="form-label">Nama Lengkap</label>
                                <input type="text" class="form-control" id="nama" required placeholder="Masukkan nama">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required placeholder="name@example.com">
                            </div>
                            <div class="mb-3">
                                <label for="pesan" class="form-label">Pesan / Catatan</label>
                                <textarea class="form-control" id="pesan" rows="3" placeholder="Tulis pesan di sini..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Kirim Data</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Data Tersimpan (Mencerminkan Backend)</h5>
                        <button class="btn btn-sm btn-secondary" onclick="ambilData()">Refresh Data</button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Nama</th>
                                        <th>Email</th>
                                        <th>Pesan</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelBody">

                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api/formulir';
        document.getElementById('formKaryawan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nama = document.getElementById('nama').value;
            const email = document.getElementById('email').value;
            const pesan = document.getElementById('pesan').value;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nama, email, pesan })
                });

                const hasil = await response.json();

                if (hasil.success) {
                    alert('Data berhasil terkirim!');
                    document.getElementById('formKaryawan').reset(); 
                    ambilData();
                } else {
                    alert('Gagal mengirim data: ' + hasil.message);
                }
            } catch (error) {
                console.error('Error saat POST data:', error);
                alert('Gagal menyambung ke server backend.');
            }
        });

        async function ambilData() {
            try {
                const response = await fetch(API_URL);
                const hasil = await response.json();

                const tabelBody = document.getElementById('tabelBody');
                tabelBody.innerHTML = '';

                if (hasil.data && hasil.data.length > 0) {
                    hasil.data.forEach(item => {
                        const row = `
                            <tr>
                                <td>${item.id}</td>
                                <td>${item.nama}</td>
                                <td>${item.email}</td>
                                <td>${item.pesan || '-'}</td>
                            </tr>
                        `;
                        tabelBody.innerHTML += row;
                    });
                } else {
                    tabelBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Belum ada data di server array.</td></tr>`;
                }
            } catch (error) {
                console.error('Error saat GET data:', error);
            }
        }

        window.onload = ambilData;
    </script>
</body>
</html>
